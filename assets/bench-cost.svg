<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 176" font-family="Segoe UI,-apple-system,Helvetica,Arial,sans-serif">
  <text x="8" y="24" font-size="15" font-weight="600" fill="#8b949e">The same coding jobs, asked two ways &#8212; what the session cost</text>
  <rect x="586" y="4" width="86" height="34" rx="17" fill="#16a34a"/>
  <text x="629" y="27" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">&#8722;25%</text>
  <rect x="250" y="52" width="380" height="28" rx="3" fill="#e0653f"/>
  <text x="8" y="71" font-size="12.5" fill="#8b949e">one-line ask</text>
  <text x="622" y="71" text-anchor="end" font-size="13" font-weight="700" fill="#ffffff">$0.21</text>
  <rect x="250" y="88" width="286" height="28" rx="3" fill="#16a34a"/>
  <text x="8" y="107" font-size="13" font-weight="700" fill="#16a34a">Foreman handoff</text>
  <text x="528" y="107" text-anchor="end" font-size="13" font-weight="700" fill="#ffffff">$0.16</text>
  <text x="8" y="136" font-size="12.5" fill="#8b949e">Every fact left out of the ask gets bought back &#8212; paid exploration of your codebase, every session.</text>
  <text x="8" y="162" font-size="11" fill="#8b949e">Average across the benchmark jobs on the bigger model &#8212; the shortest prompt was the most expensive session.</text>
</svg>
