<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 206" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">
  <style>
    .title{fill:#1f2937;font-size:17px;font-weight:700}
    .sub{fill:#6b7280;font-size:12.5px}
    .item{fill:#374151;font-size:13.5px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    .fmitem{fill:#16a34a;font-size:13.5px;font-weight:700;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    .amt{fill:#374151;font-size:13.5px;font-weight:600;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    .fmamt{fill:#16a34a;font-size:14px;font-weight:700;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    .rule{stroke:#d7dde4;stroke-width:1}
    .foot{fill:#6b7280;font-size:12.5px}.em{fill:#16a34a;font-weight:700}
    @media (prefers-color-scheme:dark){
      .title{fill:#e6edf3}.sub{fill:#9198a1}.item{fill:#c9d1d9}.fmitem{fill:#22c55e}
      .amt{fill:#c9d1d9}.fmamt{fill:#22c55e}.rule{stroke:#30363d}.foot{fill:#9198a1}.em{fill:#22c55e}
    }
  </style>
  <text x="16" y="28" class="title">The same coding jobs, asked two ways</text>
  <text x="16" y="50" class="sub">What the session cost, on the bigger model</text>

  <text x="16" y="92" class="item">one-line ask</text>
  <text x="704" y="92" class="amt" text-anchor="end">$0.21</text>

  <text x="16" y="120" class="fmitem">Foreman handoff</text>
  <text x="704" y="120" class="fmamt" text-anchor="end">$0.16</text>

  <line x1="16" y1="140" x2="704" y2="140" class="rule"/>

  <text x="16" y="164" class="fmitem">what Foreman takes off the bill</text>
  <text x="704" y="164" class="fmamt" text-anchor="end">$0.05</text>

  <text x="16" y="192" class="foot">Every fact left out of the ask gets bought back &#8212; <tspan class="em">paid exploration</tspan> of your codebase, every session.</text>
</svg>
