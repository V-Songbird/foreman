<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 212" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">
  <style>
    .title{fill:#1f2937;font-size:17px;font-weight:700}
    .sub{fill:#6b7280;font-size:12.5px}
    .fmlab{fill:#16a34a;font-size:13px;font-weight:700}
    .fail{fill:#e0653f}.pass{fill:#16a34a}.badge{fill:#16a34a}
    .foot{fill:#6b7280;font-size:12.5px}
    @media (prefers-color-scheme:dark){
      .title{fill:#e6edf3}.sub{fill:#9198a1}.fmlab{fill:#22c55e}
      .fail{fill:#ef6c46}.pass{fill:#22c55e}.badge{fill:#22c55e}.foot{fill:#9198a1}
    }
  </style>
  <text x="16" y="28" class="title">The brief pointed at a file that had been renamed</text>
  <text x="16" y="50" class="sub">Did broken work ship, on the smaller model?</text>

  <rect x="618" y="4" width="86" height="34" rx="17" class="badge"/>
  <text x="661" y="27" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">never</text>

  <rect x="258" y="78" width="380" height="28" rx="3" class="fail"/>
  <text x="16" y="97" class="sub">one-line ask</text>
  <text x="630" y="97" text-anchor="end" font-size="13" font-weight="700" fill="#ffffff">every time</text>

  <rect x="258" y="114" width="5" height="28" rx="2" class="pass"/>
  <text x="16" y="133" class="fmlab">Foreman handoff</text>
  <text x="279" y="133" class="fmlab">never &#8212; it checked the brief against the code first</text>

  <text x="16" y="166" class="foot">The one-line ask patched the wrong file every single time; the handoff checked first and shipped working code.</text>
  <text x="16" y="190" class="sub">A hand-written brief recovers too &#8212; Foreman just writes it for you.</text>
</svg>
