<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 246" font-family="Segoe UI,-apple-system,Helvetica,Arial,sans-serif">
  <text x="8" y="24" font-size="15" font-weight="600" fill="#8b949e">&#8220;What should I work on next?&#8221; &#8212; cost per ask as the backlog grows</text>
  <rect x="250" y="52" width="217" height="28" rx="3" fill="#e0653f"/>
  <text x="8" y="71" font-size="12.5" fill="#8b949e">to-do file &#8212; 10 tasks</text>
  <text x="459" y="71" text-anchor="end" font-size="13" font-weight="700" fill="#ffffff">$0.12</text>
  <rect x="250" y="88" width="253" height="28" rx="3" fill="#e0653f"/>
  <text x="8" y="107" font-size="12.5" fill="#8b949e">to-do file &#8212; 50 tasks</text>
  <text x="495" y="107" text-anchor="end" font-size="13" font-weight="700" fill="#ffffff">$0.14</text>
  <rect x="250" y="124" width="380" height="28" rx="3" fill="#e0653f"/>
  <text x="8" y="143" font-size="12.5" fill="#8b949e">to-do file &#8212; 150 tasks</text>
  <text x="622" y="143" text-anchor="end" font-size="13" font-weight="700" fill="#ffffff">$0.21</text>
  <rect x="250" y="160" width="5" height="28" rx="2" fill="#16a34a"/>
  <text x="8" y="179" font-size="13" font-weight="700" fill="#16a34a">Foreman roadmap &#8212; any size</text>
  <text x="263" y="179" font-size="13" font-weight="700" fill="#16a34a">free &#8212; and the same answer every time</text>
  <text x="8" y="208" font-size="12.5" fill="#8b949e">A markdown backlog gets re-read and re-reasoned on every ask; the roadmap is read mechanically.</text>
  <text x="8" y="232" font-size="11" fill="#8b949e">Cost per &#8220;what&#8217;s next?&#8221; on the bigger model &#8212; and the to-do file&#8217;s pick can change from ask to ask.</text>
</svg>
