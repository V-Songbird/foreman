<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 216" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">
  <style>
    .title{fill:#1f2937;font-size:17px;font-weight:700}
    .sub{fill:#6b7280;font-size:12.5px}
    .item{fill:#374151;font-size:13.5px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    .fmitem{fill:#16a34a;font-size:13.5px;font-weight:700;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    .amt{fill:#374151;font-size:13.5px;font-weight:600;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    .fmamt{fill:#16a34a;font-size:14px;font-weight:700;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    .rule{stroke:#d7dde4;stroke-width:1}
    .foot{fill:#6b7280;font-size:12.5px}.em{fill:#16a34a;font-weight:700}
    @media (prefers-color-scheme:dark){
      .title{fill:#e6edf3}.sub{fill:#9198a1}.item{fill:#c9d1d9}.fmitem{fill:#22c55e}
      .amt{fill:#c9d1d9}.fmamt{fill:#22c55e}.rule{stroke:#30363d}.foot{fill:#9198a1}.em{fill:#22c55e}
    }
  </style>
  <text x="16" y="28" class="title">&#8220;What should I work on next?&#8221;</text>
  <text x="16" y="50" class="sub">Cost per ask as the backlog grows</text>

  <text x="16" y="92" class="item">to-do file &#8212; 10 tasks</text>
  <text x="704" y="92" class="amt" text-anchor="end">$0.12</text>

  <text x="16" y="120" class="item">to-do file &#8212; 50 tasks</text>
  <text x="704" y="120" class="amt" text-anchor="end">$0.14</text>

  <text x="16" y="148" class="item">to-do file &#8212; 150 tasks</text>
  <text x="704" y="148" class="amt" text-anchor="end">$0.21</text>

  <line x1="16" y1="168" x2="704" y2="168" class="rule"/>

  <text x="16" y="192" class="fmitem">Foreman roadmap &#8212; any size</text>
  <text x="704" y="192" class="fmamt" text-anchor="end">free</text>

  <text x="16" y="212" class="foot">A to-do file gets <tspan class="em">re-read and re-reasoned</tspan> on every ask; the roadmap is read mechanically.</text>
</svg>
